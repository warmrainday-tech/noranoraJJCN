<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 — 绫月乃萝 Fan Site</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        [data-theme="dark"] {
            --bg: #0a0a0f; --bg2: #12121a; --text: #e8e8f0; --text-dim: #888899;
            --accent: #c8a2e8; --accent2: #ff7eb3;
            --border: rgba(255,255,255,0.08); --card-bg: rgba(255,255,255,0.03);
        }
        [data-theme="light"] {
            --bg: #f8f6f3; --bg2: #eeecea; --text: #2a2a35; --text-dim: #888890;
            --accent: #a67dd6; --accent2: #e8608a;
            --border: rgba(0,0,0,0.1); --card-bg: rgba(0,0,0,0.03);
        }
        [data-theme="lavender"] {
            --bg: #e8e0f0; --bg2: #ddd4ec; --text: #2d1f4e; --text-dim: #7a6b9a;
            --accent: #7b5ea7; --accent2: #b06cc7;
            --border: rgba(123,94,167,0.15); --card-bg: rgba(123,94,167,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.4s, color 0.4s; }
        a { color: var(--accent); text-decoration: none; }
        img { display: block; max-width: 100%; }

        .settings-page { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

        .settings-header {
            display: flex; align-items: center; justify-content: space-between;
            padding-bottom: 30px; border-bottom: 1px solid var(--border); margin-bottom: 40px;
        }
        .settings-header h1 {
            font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 700;
            letter-spacing: 0.15em;
        }
        .back-link {
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em;
            color: var(--text-dim); display: flex; align-items: center; gap: 6px;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--accent); }

        .section { margin-bottom: 50px; }
        .section h2 {
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 0.2em; color: var(--text-dim); margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Mode Switch */
        .mode-switch {
            display: flex; gap: 20px;
        }
        .mode-card {
            flex: 1; padding: 25px; background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: center;
        }
        .mode-card:hover { border-color: var(--accent); }
        .mode-card.active { border-color: var(--accent); background: rgba(200,162,232,0.05); }
        .mode-card .preview {
            width: 100%; height: 160px; border-radius: 8px; margin-bottom: 15px;
            overflow: hidden; background: var(--bg2);
        }
        .mode-card .preview img { width: 100%; height: 100%; object-fit: cover; }
        .mode-card h3 {
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 600;
            letter-spacing: 0.1em; margin-bottom: 5px;
        }
        .mode-card p { font-size: 0.8rem; color: var(--text-dim); }

        /* Theme swatch (色卡) */
        .theme-swatch { padding: 0; overflow: hidden; }
        .theme-swatch .swatch { width: 100%; height: 80px; border-radius: 10px 10px 0 0; }
        .theme-swatch span {
            display: block; text-align: center; padding: 10px 0;
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            font-weight: 600; letter-spacing: 0.1em; color: var(--text-dim);
        }
        .theme-swatch.active span { color: var(--accent); }

        /* Config Table */
        .config-table { width: 100%; border-collapse: collapse; }
        .config-table th, .config-table td {
            padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .config-table th { color: var(--text-dim); font-weight: 400; width: 160px; white-space: nowrap; }

        input[type="text"], input[type="url"], input[type="number"], select {
            width: 100%; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.9rem; outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); }

        .btn-row { display: flex; gap: 12px; margin-top: 30px; }
        .btn {
            padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
            font-family: inherit; transition: all 0.3s;
            border: 1px solid var(--border); background: var(--bg2); color: var(--text);
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm {
            padding: 4px 8px; font-size: 0.7rem; border: none; background: transparent;
            color: var(--text-dim);
        }
        .btn-sm:hover { color: var(--accent); }
        .btn-sm.btn-danger { color: #e06070; }
        .btn-sm.btn-danger:hover { color: #ff4040; }
        .btn-primary { display:none; }

        /* Image Grid (for hero bg selection) */
        .image-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px; margin-top: 15px;
        }
        .image-grid .img-option {
            aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer;
            border: 2px solid transparent; transition: all 0.3s; position: relative;
        }
        .image-grid .img-option:hover { border-color: var(--text-dim); }
        .image-grid .img-option.selected { border-color: var(--accent); }
        .image-grid .img-option img { width: 100%; height: 100%; object-fit: cover; }
        .image-grid .img-option.selected::after {
            content: '✓'; position: absolute; top: 5px; right: 5px;
            background: var(--accent); color: white; width: 22px; height: 22px;
            border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
        }

        /* Gallery image row */
        .gallery-img-row { display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border); }
        .gallery-img-row .thumb { width:50px;height:50px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--bg2); }
        .gallery-img-row .thumb img { width:100%;height:100%;object-fit:cover; }
        .gallery-img-row input[type="text"] { flex:1; }
        .gallery-img-row .tall-badge { font-size:0.65rem;padding:2px 6px;border-radius:10px;background:var(--accent);color:white;margin-right:4px; }
        .gallery-img-row .btn-sm { font-size:0.7rem;padding:4px 10px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--accent); color: white; padding: 12px 30px; border-radius: 50px;
            font-size: 0.85rem; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            z-index: 1000; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="settings-page">
        <div class="settings-header">
            <h1>⚙ SETTINGS</h1>
            <a href="index.html" class="back-link">← BACK</a>
        </div>

        <!-- 主题 -->
        <div class="section">
            <h2>THEME</h2>
            <div class="mode-switch">
                <div class="mode-card theme-swatch" data-theme="dark" onclick="selectTheme('dark')">
                    <div class="swatch" style="background:#0a0a0f"></div>
                    <span>DARK</span>
                </div>
                <div class="mode-card theme-swatch" data-theme="light" onclick="selectTheme('light')">
                    <div class="swatch" style="background:#f8f6f3"></div>
                    <span>LIGHT</span>
                </div>
                <div class="mode-card theme-swatch" data-theme="lavender" onclick="selectTheme('lavender')">
                    <div class="swatch" style="background:#e8e0f0"></div>
                    <span>LAVENDER</span>
                </div>
            </div>
        </div>

        <!-- 首页模式 -->
        <div class="section">
            <h2>HOME MODE</h2>
            <div class="mode-switch">
                <div class="mode-card" data-mode="art" onclick="selectMode('art')">
                    <div class="preview"><img src="images/pixiv_hd_1.jpg" alt="Art Mode"></div>
                    <h3>ART</h3>
                    <p>插画全屏Hero背景</p>
                </div>
                <div class="mode-card" data-mode="emoji" onclick="selectMode('emoji')">
                    <div class="preview" style="display:flex;flex-wrap:wrap;gap:2px;padding:4px;background:#111;">
                        <img src="noraemoji/07A21E208726EF4EB062DF73BAD53FB3.jpg" style="width:30%;height:auto;border-radius:3px;" alt="">
                        <img src="noraemoji/15049341992A4951DA6F94B981705031.jpg" style="width:30%;height:auto;border-radius:3px;" alt="">
                        <img src="noraemoji/30369B89C7858820E17FF1680FC01287.jpg" style="width:30%;height:auto;border-radius:3px;" alt="">
                        <img src="noraemoji/4A36F3A93BE3277227A7CD8E64FF18AB.jpg" style="width:30%;height:auto;border-radius:3px;" alt="">
                        <img src="noraemoji/6163803096E016D09942A68BF511B26D.jpg" style="width:30%;height:auto;border-radius:3px;" alt="">
                        <img src="noraemoji/907F06D73D75F0177E52D97FC37A7571.jpg" style="width:30%;height:auto;border-radius:3px;" alt="">
                    </div>
                    <h3>EMOJI</h3>
                    <p>奶萝emoji瀑布滚动</p>
                </div>
            </div>
        </div>

        <!-- Emoji瀑布设置 -->
        <div class="section" id="emojiSection">
            <h2>EMOJI WATERFALL</h2>
            <table class="config-table">
                <tr><th>列数</th><td><input type="number" id="emojiCols" value="15" min="4" max="20" onchange="autoSaveSettings()"></td></tr>
                <tr><th>滚动速度</th><td><input type="number" id="emojiSpeed" value="30" min="10" max="60" onchange="autoSaveSettings()"></td></tr>
                <tr><th>透明度</th><td><input type="number" id="emojiOpacity" value="0.6" min="0.1" max="1" step="0.1" onchange="autoSaveSettings()"></td></tr>
                <tr><th>滚动方向</th><td>
                    <select id="emojiDirection" onchange="autoSaveSettings()">
                        <option value="vertical">垂直</option>
                        <option value="diagonal-left">左斜</option>
                        <option value="diagonal-right" selected>右斜</option>
                    </select>
                </td></tr>
            </table>
        </div>

        <!-- Hero背景图 -->
        <div class="section" id="heroImageSection">
            <h2>HERO IMAGE</h2>
            <p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:10px">选择Art模式的首页背景图</p>
            <div class="image-grid" id="heroImageGrid"></div>
        </div>

        <!-- 社交链接 -->
        <div class="section">
            <h2>SOCIAL LINKS</h2>
            <table class="config-table">
                <tr><th>Bilibili</th><td><input type="url" id="linkBilibili" value="https://space.bilibili.com/86471108" oninput="autoSaveSettings()"></td></tr>
                <tr><th>Twitter</th><td><input type="url" id="linkTwitter" value="https://twitter.com/Ayatsuki_Nora" oninput="autoSaveSettings()"></td></tr>
                <tr><th>Pixiv</th><td><input type="url" id="linkPixiv" value="https://www.pixiv.net/users/36966416" oninput="autoSaveSettings()"></td></tr>
            </table>
        </div>

        <!-- 个人资料 -->
        <div class="section">
            <h2>PROFILE</h2>
            <table class="config-table">
                <tr><th>名前</th><td><input type="text" id="profileName" value="綾月乃蘿" oninput="autoSaveSettings()"></td></tr>
                <tr><th>EN NAME</th><td><input type="text" id="profileNameEn" value="Ayatsuki Nora" oninput="autoSaveSettings()"></td></tr>
                <tr><th>TAGLINE</th><td><input type="text" id="profileTagline" value="イラストレーター × 配信者" oninput="autoSaveSettings()"></td></tr>
                <tr><th>誕生日</th><td><input type="text" id="profileBday" value="04月21日" oninput="autoSaveSettings()"></td></tr>
                <tr><th>種族</th><td><input type="text" id="profileRace" value="野猫" oninput="autoSaveSettings()"></td></tr>
                <tr><th>特性</th><td><input type="text" id="profileTrait" value="两只豆豆眉" oninput="autoSaveSettings()"></td></tr>
                <tr><th>言語</th><td><input type="text" id="profileLang" value="中文 / 日本語" oninput="autoSaveSettings()"></td></tr>
                <tr><th>活動</th><td><input type="text" id="profileActivity" value="イラスト制作 × ライブ配信" oninput="autoSaveSettings()"></td></tr>
                <tr><th>简介</th><td><input type="text" id="profileDesc" value="猫猫画師兼職虛擬主播，你的賽博損友！" oninput="autoSaveSettings()"></td></tr>
                <tr><th>头像</th><td>
                    <div style="display:flex;gap:8px;align-items:center">
                        <input type="text" id="profileAvatar" value="images/avatar.jpg" oninput="autoSaveSettings()" style="flex:1">
                        <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="uploadAvatarImage(this)">
                        <button class="btn" onclick="document.getElementById('avatarFileInput').click()">📁 上传</button>
                    </div>
                </td></tr>
            </table>
        </div>

        <!-- 画廊设置 -->
        <div class="section">
            <h2>GALLERY</h2>
            <table class="config-table">
                <tr><th>列数</th><td>
                    <select id="galleryCols" onchange="autoSaveSettings()">
                        <option value="2">2列</option>
                        <option value="3" selected>3列</option>
                        <option value="4">4列</option>
                    </select>
                </td></tr>
                <tr><th>间距</th><td><input type="number" id="galleryGap" value="16" min="0" max="40" onchange="autoSaveSettings()" style="width:80px"> px</td></tr>
            </table>
            <div style="margin-top:20px">
                <h3 style="font-size:0.8rem;color:var(--text-dim);margin-bottom:10px">图片列表</h3>
                <div style="display:flex;gap:8px;margin-bottom:10px">
                    <input type="text" id="newGalleryImg" placeholder="images/xxx.jpg" style="flex:1">
                    <select id="newGalleryTall" style="width:80px;flex:none"><option value="0">普通</option><option value="1">高(tall)</option></select>
                    <button class="btn" onclick="addGalleryImage()">+ 添加</button>
                    <input type="file" id="galleryFileInput" accept="image/*" style="display:none" onchange="uploadGalleryImage(this)">
                    <button class="btn" onclick="document.getElementById('galleryFileInput').click()">📁 上传</button>
                </div>
                <div id="galleryImageList"></div>
            </div>
        </div>

        <!-- VIDEO 管理 -->
        <div class="section">
            <h2>VIDEO</h2>
            <div style="display:flex;gap:8px;margin-bottom:10px">
                <input type="text" id="newMovieImg" placeholder="图片URL" style="flex:1">
                <input type="text" id="newMovieLink" placeholder="跳转链接" style="flex:1">
                <input type="file" id="movieFileInput" accept="image/*" style="display:none" onchange="uploadMovieImage(this)">
                <button class="btn" onclick="document.getElementById('movieFileInput').click()">📁 上传</button>
                <button class="btn" onclick="addMovieItem()">+ 添加</button>
            </div>
            <div id="movieItemList"></div>
        </div>

        <!-- GOODS 管理 -->
        <div class="section">
            <h2>GOODS</h2>
            <div style="display:flex;gap:8px;margin-bottom:10px">
                <input type="text" id="newGoodsImg" placeholder="图片URL" style="flex:1">
                <input type="text" id="newGoodsLink" placeholder="跳转链接" style="flex:1">
                <input type="file" id="goodsFileInput" accept="image/*" style="display:none" onchange="uploadGoodsImage(this)">
                <button class="btn" onclick="document.getElementById('goodsFileInput').click()">📁 上传</button>
                <button class="btn" onclick="addGoodsItem()">+ 添加</button>
            </div>
            <div id="goodsItemList"></div>
        </div>

        </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== 可选的Hero背景图（已废弃，改用画廊列表）=====

        function buildHeroImageGrid() {
            const grid = document.getElementById('heroImageGrid');
            grid.innerHTML = '';
            const saved = localStorage.getItem('nora_hero_image') || 'images/pixiv_hd_1.jpg';
            // 从画廊图片列表读取（与画廊同步）
            const gallery = getGalleryImages();
            gallery.forEach(img => {
                const div = document.createElement('div');
                div.className = 'img-option' + (img.src === saved ? ' selected' : '');
                div.onclick = () => selectHeroImage(img.src);
                div.innerHTML = `<img src="${img.src}" alt="">`;
                grid.appendChild(div);
            });
        }

        function selectHeroImage(src) {
            document.querySelectorAll('.img-option').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            localStorage.setItem('nora_hero_image', src);
        }

        // ===== Theme =====
        function selectTheme(theme) {
            document.querySelectorAll('.mode-card[data-theme]').forEach(el => el.classList.remove('active'));
            document.querySelector(`.mode-card[data-theme="${theme}"]`).classList.add('active');
            document.documentElement.setAttribute('data-theme', theme);
            const settings = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            settings.theme = theme;
            localStorage.setItem('nora_settings', JSON.stringify(settings));
        }

        // ===== Mode =====
        function selectMode(mode) {
            document.querySelectorAll('.mode-card[data-mode]').forEach(el => el.classList.remove('active'));
            document.querySelector(`.mode-card[data-mode="${mode}"]`).classList.add('active');
            localStorage.setItem('nora_home_mode', mode);
            // 显示/隐藏hero image section
            document.getElementById('heroImageSection').style.display = mode === 'art' ? 'block' : 'none';
            // 显示/隐藏emoji section
            document.getElementById('emojiSection').style.display = mode === 'emoji' ? 'block' : 'none';
        }

        // ===== Save/Load (GitHub config.json - 全站共享) =====
        const CONFIG_PATH = 'js/config.json';

        function getSettings() {
            return {
                theme: document.documentElement.getAttribute('data-theme') || 'dark',
                homeMode: localStorage.getItem('nora_home_mode') || 'art',
                heroImage: localStorage.getItem('nora_hero_image') || 'images/pixiv_hd_1.jpg',
                links: {
                    bilibili: document.getElementById('linkBilibili').value,
                    twitter: document.getElementById('linkTwitter').value,
                    pixiv: document.getElementById('linkPixiv').value,
                },
                profile: {
                    name: document.getElementById('profileName').value,
                    nameEn: document.getElementById('profileNameEn').value,
                    tagline: document.getElementById('profileTagline').value,
                    bday: document.getElementById('profileBday').value,
                    race: document.getElementById('profileRace').value,
                    trait: document.getElementById('profileTrait').value,
                    lang: document.getElementById('profileLang').value,
                    activity: document.getElementById('profileActivity').value,
                    desc: document.getElementById('profileDesc').value,
                    avatar: document.getElementById('profileAvatar').value,
                },
                gallery: {
                    cols: document.getElementById('galleryCols').value,
                    gap: document.getElementById('galleryGap').value,
                },
                emoji: {
                    cols: document.getElementById('emojiCols').value,
                    speed: document.getElementById('emojiSpeed').value,
                    opacity: document.getElementById('emojiOpacity').value,
                    direction: document.getElementById('emojiDirection').value,
                },
                galleryImages: getGalleryImages(),
                movies: getMovies(),
                goods: getGoods(),
            };
        }

        async function saveSettings() {
            const s = getSettings();
            try {
                let sha = '';
                try {
                    const r = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${CONFIG_PATH}`, {
                        headers: { Authorization: `token ${GITHUB_TOKEN}` }
                    });
                    if (r.ok) { const d = await r.json(); sha = d.sha; }
                } catch(e) {}
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(s, null, 2))));
                const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${CONFIG_PATH}`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'update config', content, sha: sha || undefined })
                });
                if (resp.ok) {
                    showToast('设置已保存 ✓');
                } else {
                    showToast('保存失败: ' + resp.status);
                }
            } catch(e) {
                showToast('保存失败: ' + e.message);
            }
        }

        async function loadSettings() {
            try {
                const resp = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${CONFIG_PATH}`);
                if (!resp.ok) return;
                const s = await resp.json();
                if (s.theme) {
                    document.documentElement.setAttribute('data-theme', s.theme);
                    document.querySelector(`.mode-card[data-theme="${s.theme}"]`)?.classList.add('active');
                }
                if (s.homeMode) { localStorage.setItem('nora_home_mode', s.homeMode); selectMode(s.homeMode); }
                if (s.heroImage) localStorage.setItem('nora_hero_image', s.heroImage);
                if (s.links) {
                    if (s.links.bilibili) document.getElementById('linkBilibili').value = s.links.bilibili;
                    if (s.links.twitter) document.getElementById('linkTwitter').value = s.links.twitter;
                    if (s.links.pixiv) document.getElementById('linkPixiv').value = s.links.pixiv;
                }
                if (s.profile) {
                    const p = s.profile;
                    if (p.name) document.getElementById('profileName').value = p.name;
                    if (p.nameEn) document.getElementById('profileNameEn').value = p.nameEn;
                    if (p.tagline) document.getElementById('profileTagline').value = p.tagline;
                    if (p.bday) document.getElementById('profileBday').value = p.bday;
                    if (p.race) document.getElementById('profileRace').value = p.race;
                    if (p.trait) document.getElementById('profileTrait').value = p.trait;
                    if (p.lang) document.getElementById('profileLang').value = p.lang;
                    if (p.activity) document.getElementById('profileActivity').value = p.activity;
                    if (p.desc) document.getElementById('profileDesc').value = p.desc;
                    if (p.avatar) document.getElementById('profileAvatar').value = p.avatar;
                }
                if (s.gallery) {
                    if (s.gallery.cols) document.getElementById('galleryCols').value = s.gallery.cols;
                    if (s.gallery.gap) document.getElementById('galleryGap').value = s.gallery.gap;
                }
                if (s.emoji) {
                    if (s.emoji.cols) document.getElementById('emojiCols').value = s.emoji.cols;
                    if (s.emoji.speed) document.getElementById('emojiSpeed').value = s.emoji.speed;
                    if (s.emoji.opacity) document.getElementById('emojiOpacity').value = s.emoji.opacity;
                    if (s.emoji.direction) document.getElementById('emojiDirection').value = s.emoji.direction;
                }
                if (s.galleryImages) { saveGalleryImages(s.galleryImages); renderGalleryList(); }
                if (s.movies) { saveMovies(s.movies); renderMovieList(); }
                if (s.goods) { saveGoods(s.goods); renderGoodsList(); }
                buildHeroImageGrid();
            } catch(e) { console.warn('加载远程配置失败:', e); }
        }

        let autoSaveTimer;
        function autoSaveSettings() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => { saveSettings(); }, 600);
        }

        // ===== Gallery image management =====
        const DEFAULT_GALLERY = [
            { src: 'https://cdn.jsdelivr.net/gh/warmrainday-tech/noranoraJJCN/images/pixiv_hd_1.jpg', tall: true },
            { src: 'images/pixiv_hd_3.jpg', tall: false },
            { src: 'images/pixiv_hd_4.jpg', tall: false },
            { src: 'images/pixiv_hd_5.jpg', tall: true },
            { src: 'images/pixiv_hd_6.jpg', tall: false },
            { src: 'images/pixiv_hd_7.jpg', tall: false },
            { src: 'images/pixiv_hd_9.jpg', tall: true },
            { src: 'images/pixiv_hd_10.jpg', tall: false },
            { src: 'images/pixiv_hd_12.jpg', tall: false },
        ];

        function getGalleryImages() {
            const s = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            if (s.galleryImages && s.galleryImages.length) return s.galleryImages;
            return JSON.parse(JSON.stringify(DEFAULT_GALLERY));
        }

        function saveGalleryImages(images) {
            const s = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            s.galleryImages = images;
            localStorage.setItem('nora_settings', JSON.stringify(s));
        }

        function renderGalleryList() {
            const list = document.getElementById('galleryImageList');
            const images = getGalleryImages();
            list.innerHTML = images.map((img, i) => `
                <div class="gallery-img-row">
                    <div class="thumb"><img src="${img.src}" alt="" onerror="this.style.display='none'"></div>
                    <input type="text" value="${img.src.replace(/"/g, '&quot;')}" oninput="updateGallerySrc(${i}, this.value)">
                    ${img.tall ? '<span class="tall-badge">TALL</span>' : ''}
                    <button class="btn btn-sm" onclick="toggleGalleryTall(${i})" style="width:28px;font-size:1rem">↕</button>
                    <button class="btn btn-sm btn-danger" onclick="removeGalleryImage(${i})" style="font-size:1rem">✕</button>
                </div>
            `).join('');
        }

        function updateGallerySrc(idx, value) {
            const images = getGalleryImages();
            images[idx].src = value.trim();
            saveGalleryImages(images);
        }

        function toggleGalleryTall(idx) {
            const images = getGalleryImages();
            images[idx].tall = !images[idx].tall;
            saveGalleryImages(images);
            renderGalleryList();
        }

        function removeGalleryImage(idx) {
            const images = getGalleryImages();
            images.splice(idx, 1);
            saveGalleryImages(images);
            renderGalleryList();
            showToast('已删除');
        }

        function addGalleryImage() {
            const url = document.getElementById('newGalleryImg').value.trim();
            if (!url) { showToast('请输入图片URL'); return; }
            const tall = document.getElementById('newGalleryTall').value === '1';
            const images = getGalleryImages();
            images.push({ src: url, tall });
            saveGalleryImages(images);
            document.getElementById('newGalleryImg').value = '';
            renderGalleryList();
            showToast('已添加');
        }

        // ===== GitHub 图床上传 (jsDelivr CDN) =====
        const GITHUB_TOKEN = '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';
        const GITHUB_REPO = 'warmrainday-tech/noranoraJJCN';
        const CDN_BASE = 'https://cdn.jsdelivr.net/gh/warmrainday-tech/noranoraJJCN/';

        async function uploadToGithub(file, targetFieldId, autoAdd) {
            if (!file) return;
            const ts = Date.now();
            const ext = file.name.split('.').pop().toLowerCase() || 'jpg';
            const path = `images/uploads/${ts}.${ext}`;
            const content = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = () => resolve(r.result.split(',')[1]);
                r.readAsDataURL(file);
            });
            try {
                const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `upload ${file.name}`, content })
                });
                if (resp.ok) {
                    const rawUrl = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${path}`;
                    const cdnUrl = CDN_BASE + path;
                    document.getElementById(targetFieldId).value = rawUrl;
                    if (autoAdd) autoAdd(rawUrl);
                    showToast('上传成功 ✓');
                } else {
                    const err = await resp.json();
                    showToast('上传失败: ' + (err.message || resp.status));
                }
            } catch (e) {
                showToast('上传失败: ' + e.message);
            }
        }

        async function uploadGalleryImage(input) {
            const file = input.files[0];
            uploadToGithub(file, 'newGalleryImg', (url) => {
                const tall = document.getElementById('newGalleryTall').value === '1';
                const images = getGalleryImages();
                images.push({ src: url, tall });
                saveGalleryImages(images);
                renderGalleryList();
            });
        }
        async function uploadMovieImage(input) {
            const file = input.files[0];
            uploadToGithub(file, 'newMovieImg', (url) => {
                const link = document.getElementById('newMovieLink').value.trim();
                const m = getMovies();
                m.push({ src: url, link: link || '#' });
                saveMovies(m);
                document.getElementById('newMovieLink').value = '';
                renderMovieList();
            });
        }
        async function uploadGoodsImage(input) {
            const file = input.files[0];
            uploadToGithub(file, 'newGoodsImg', (url) => {
                const link = document.getElementById('newGoodsLink').value.trim();
                const g = getGoods();
                g.push({ src: url, link: link || '#' });
                saveGoods(g);
                document.getElementById('newGoodsLink').value = '';
                renderGoodsList();
            });
        }
        async function uploadAvatarImage(input) {
            const file = input.files[0];
            if (!file) return;
            await uploadToGithub(file, 'profileAvatar');
            if (document.getElementById('profileAvatar').value.startsWith(CDN_BASE)) {
                autoSaveSettings();
            }
        }

        // ===== MOVIE management =====
        const DEFAULT_MOVIES = [
            { src: 'images/vid_1.jpg', link: 'https://www.bilibili.com/video/BV1TXnSzXE8N' },
            { src: 'images/vid_5.jpg', link: 'https://space.bilibili.com/86471108' },
            { src: 'images/vid_7.jpg', link: 'https://space.bilibili.com/86471108' },
            { src: 'images/vid_8.jpg', link: 'https://space.bilibili.com/86471108' },
        ];

        function getMovies() {
            const s = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            if (s.movies) return s.movies;
            return JSON.parse(JSON.stringify(DEFAULT_MOVIES));
        }
        function saveMovies(arr) {
            const s = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            s.movies = arr;
            localStorage.setItem('nora_settings', JSON.stringify(s));
        }
        function renderMovieList() {
            const list = document.getElementById('movieItemList');
            const items = getMovies();
            list.innerHTML = items.map((m, i) => `
                <div class="gallery-img-row">
                    <div class="thumb"><img src="${m.src}" alt="" onerror="this.style.display='none'"></div>
                    <input type="text" value="${m.src.replace(/"/g,'&quot;')}" oninput="updateMovieSrc(${i},this.value)" style="flex:1">
                    <input type="text" value="${m.link.replace(/"/g,'&quot;')}" oninput="updateMovieLink(${i},this.value)" style="flex:1">
                    <button class="btn btn-sm btn-danger" onclick="removeMovieItem(${i})" style="font-size:1rem">✕</button>
                </div>
            `).join('');
        }
        function updateMovieSrc(idx, v) { const m = getMovies(); m[idx].src = v.trim(); saveMovies(m); }
        function updateMovieLink(idx, v) { const m = getMovies(); m[idx].link = v.trim(); saveMovies(m); }
        function removeMovieItem(idx) { const m = getMovies(); m.splice(idx,1); saveMovies(m); renderMovieList(); }
        function addMovieItem() {
            const src = document.getElementById('newMovieImg').value.trim();
            const link = document.getElementById('newMovieLink').value.trim();
            if (!src) { showToast('请输入图片URL'); return; }
            const m = getMovies();
            m.push({ src, link: link || '#' });
            saveMovies(m);
            document.getElementById('newMovieImg').value = '';
            document.getElementById('newMovieLink').value = '';
            renderMovieList();
            showToast('已添加');
        }

        // ===== GOODS management =====
        const DEFAULT_GOODS = [
            { src: 'images/goods_1.png', link: 'https://space.bilibili.com/86471108' },
            { src: 'images/goods_2.jpg', link: 'https://space.bilibili.com/86471108' },
            { src: 'images/goods_3.jpg', link: 'https://space.bilibili.com/86471108' },
            { src: 'images/goods_4.jpg', link: 'https://space.bilibili.com/86471108' },
        ];

        function getGoods() {
            const s = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            if (s.goods && s.goods.length) return s.goods;
            return JSON.parse(JSON.stringify(DEFAULT_GOODS));
        }
        function saveGoods(arr) {
            const s = JSON.parse(localStorage.getItem('nora_settings') || '{}');
            s.goods = arr;
            localStorage.setItem('nora_settings', JSON.stringify(s));
        }
        function renderGoodsList() {
            const list = document.getElementById('goodsItemList');
            const items = getGoods();
            list.innerHTML = items.map((g, i) => `
                <div class="gallery-img-row">
                    <div class="thumb"><img src="${g.src}" alt="" onerror="this.style.display='none'"></div>
                    <input type="text" value="${g.src.replace(/"/g,'&quot;')}" oninput="updateGoodsSrc(${i},this.value)" style="flex:1">
                    <input type="text" value="${g.link.replace(/"/g,'&quot;')}" oninput="updateGoodsLink(${i},this.value)" style="flex:1">
                    <button class="btn btn-sm btn-danger" onclick="removeGoodsItem(${i})" style="font-size:1rem">✕</button>
                </div>
            `).join('');
        }
        function updateGoodsSrc(idx, v) { const g = getGoods(); g[idx].src = v.trim(); saveGoods(g); }
        function updateGoodsLink(idx, v) { const g = getGoods(); g[idx].link = v.trim(); saveGoods(g); }
        function removeGoodsItem(idx) { const g = getGoods(); g.splice(idx,1); saveGoods(g); renderGoodsList(); }
        function addGoodsItem() {
            const src = document.getElementById('newGoodsImg').value.trim();
            const link = document.getElementById('newGoodsLink').value.trim();
            if (!src) { showToast('请输入图片URL'); return; }
            const g = getGoods();
            g.push({ src, link: link || '#' });
            saveGoods(g);
            document.getElementById('newGoodsImg').value = '';
            document.getElementById('newGoodsLink').value = '';
            renderGoodsList();
            showToast('已添加');
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ===== Init =====
        document.documentElement.setAttribute('data-theme', 'dark');
        loadSettings().then(() => {
            // loadSettings 已处理 theme/mode/gallery 等
        });
    </script>
</body>
